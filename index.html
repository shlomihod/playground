<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground</title>
  <script>
    (function () {
      var ALLOWED = ['light', 'dark'];
      function validate(v) { return ALLOWED.indexOf(v) >= 0 ? v : null; }
      var stored = null;
      try { stored = localStorage.getItem('playground-theme'); } catch (e) {}
      var resolved = validate(stored);
      if (!resolved) {
        try { resolved = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }
        catch (e) { resolved = 'dark'; }
      }
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a1a;
      --bg-card: #1a1a3a;
      --text: #e0e0f0;
      --text-dim: #8888aa;
      --accent: #ffd700;
      --accent-glow: rgba(255, 215, 0, 0.15);
      --border: #2a2a4a;
      --border-strong: #333366;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    [data-theme="light"] {
      --bg: #f7f7fb;
      --bg-card: #ffffff;
      --text: #1a1a2e;
      --text-dim: #5a5a78;
      --accent: #a67c00;
      --accent-glow: rgba(166, 124, 0, 0.2);
      --border: #d0d4e0;
      --border-strong: #b8bccc;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); transition: background 0.2s, color 0.2s; }
    body { display: flex; align-items: center; justify-content: center; }
    .hub { text-align: center; max-width: 600px; padding: 2rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: var(--accent); }
    .subtitle { color: var(--text-dim); margin-bottom: 2rem; }
    .demos { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .demo-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      width: 200px;
    }
    .demo-card:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .demo-card h2 { font-size: 1.2rem; margin-bottom: 0.4rem; color: var(--accent); }
    .demo-card p { font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .theme-toggle:hover { border-color: var(--accent); }
    .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme"></button>
  <div class="hub">
    <h1>Playground</h1>
    <p class="subtitle">Interactive demos for learning AI/ML concepts</p>
    <div class="demos">
      <a class="demo-card" href="rag/">
        <h2>RAG</h2>
        <p>Visualize retrieval-augmented generation in real time</p>
      </a>
      <a class="demo-card" href="react/">
        <h2>ReAct</h2>
        <p>Step through the reasoning + acting agent loop</p>
      </a>
      <a class="demo-card" href="guardrails/">
        <h2>Guardrails</h2>
        <p>See how LLM safety classifiers evaluate content</p>
      </a>
    </div>
  </div>
  <script>
    (function () {
      var KEY = 'playground-theme';
      var ALLOWED = ['light', 'dark'];
      function validate(v) { return ALLOWED.indexOf(v) >= 0 ? v : null; }
      function current() { return validate(document.documentElement.getAttribute('data-theme')) || 'dark'; }
      function apply(t) {
        var next = validate(t) || 'dark';
        document.documentElement.setAttribute('data-theme', next);
        render();
      }
      var btn = document.getElementById('theme-toggle');
      function render() {
        var t = current();
        btn.textContent = t === 'light' ? '\uD83C\uDF19' : '\u2600\uFE0F';
        btn.title = t === 'light' ? 'Switch to dark mode' : 'Switch to light mode';
        btn.setAttribute('aria-pressed', t === 'light' ? 'true' : 'false');
      }
      btn.addEventListener('click', function () {
        var next = current() === 'light' ? 'dark' : 'light';
        try { localStorage.setItem(KEY, next); } catch (e) {}
        apply(next);
      });
      addEventListener('storage', function (e) {
        if (e.key !== KEY) return;
        var v = validate(e.newValue);
        if (v) apply(v);
      });
      addEventListener('pageshow', function () {
        var stored = null;
        try { stored = localStorage.getItem(KEY); } catch (e) {}
        var v = validate(stored);
        if (!v) {
          try { v = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }
          catch (e) { v = 'dark'; }
        }
        apply(v);
      });
      try {
        var mq = matchMedia('(prefers-color-scheme: dark)');
        var onChange = function () {
          var stored = null;
          try { stored = localStorage.getItem(KEY); } catch (e) {}
          if (!validate(stored)) apply(mq.matches ? 'dark' : 'light');
        };
        if (mq.addEventListener) mq.addEventListener('change', onChange);
        else mq.addListener(onChange);
      } catch (e) {}
      render();
    })();
  </script>
</body>
</html>
